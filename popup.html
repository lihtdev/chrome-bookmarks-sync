<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>书签同步助手</title>
    <link rel="stylesheet" href="css/popup.css">
    <script src="js/gitee.js"></script>
    <script src="js/popup.js"></script>
</head>

<body>
    <div class="content">
        <!-- 顶部用户头像 -->
        <div class="top-avatar">
            <img id="user-avatar" class="avatar" src="" alt="用户头像" />
        </div>
        
        <div class="tab active-tab" id="login-tab">
            <form>
                <div class="row">
                    <label for="client-id-input">Client ID</label>
                    <input type="text" id="client-id-input" class="input" placeholder="Gitee Client ID" />
                </div>
                <div class="row">
                    <label for="client-secret-input">Client Secret</label>
                    <input type="password" id="client-secret-input" class="input" placeholder="Gitee Client Secret" />
                </div>
                <div class="row">
                    <label for="repo-input">仓库名称</label>
                    <input type="text" id="repo-input" class="input" placeholder="Gitee 仓库名称" />
                </div>
                <div class="status" id="login-status"></div>
                <div class="row">
                    <button class="btn primary" type="button" id="login-btn">登录</button>
                    <button class="btn" type="reset">重置</button>
                </div>
            </form>
        </div>
        <div class="tab" id="sync-tab">
            <!-- 用户信息区域 -->
            <div class="user-info">
                <div class="user-details">
                    <div class="row">
                        <label>昵称：</label>
                        <span class="text-span" id="name-span"></span>
                    </div>
                    <div class="row">
                        <label>用户名：</label>
                        <span class="text-span" id="user-name-span"></span>
                    </div>
                    <div class="row">
                        <label>仓库名称：</label>
                        <span class="text-span" id="repo-name-span"></span>
                    </div>
                    <div class="row">
                        <label>最后同步时间：</label>
                        <span class="text-span" id="last-sync-time-span"></span>
                    </div>
                </div>
            </div>
            
            <!-- 书签数量展示 -->
            <div class="sync-status">
                <div class="row">
                    <label>未更新到本地：</label>
                    <span class="text-span red" id="cloud-changes-count">0</span>
                </div>
                <div class="row">
                    <label>未推送到云端：</label>
                    <span class="text-span green" id="local-changes-count">0</span>
                </div>
            </div>
            
            <div class="status" id="sync-status"></div>
            <div class="row">
                <button class="btn primary" id="start-sync-btn">立即同步</button>
                <button class="btn" id="logout-btn">退出登录</button>
            </div>
        </div>
    </div>
</body>

</html>
